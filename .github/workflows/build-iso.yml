name: Build ark Installer ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build regardless of digest'
        default: true
        type: boolean

env:
  CACHE_KEY_PREFIX: iso-digest

jobs:
  check-digest:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      needs-build: ${{ steps.decide.outputs.needs-build }}
      reason: ${{ steps.decide.outputs.reason }}
      digest: ${{ steps.digest.outputs.value }}
      aur-sha: ${{ steps.aur.outputs.sha }}
      alga-sha: ${{ steps.alga.outputs.sha }}
    steps:
      - name: Get current archlinux:latest digest
        id: digest
        run: |
          DIGEST=$(curl -sS \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry.hub.docker.com/v2/library/archlinux/manifests/latest" 2>/dev/null | \
            jq -r '.config.digest // empty')
          echo "value=${DIGEST:-unknown}" >> $GITHUB_OUTPUT
          echo "Current archlinux digest: ${DIGEST:-unknown}"

      - name: Check ark-aur latest commit
        id: aur
        run: |
          SHA=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/zamkara/ark-aur/commits/main 2>/dev/null | \
            jq -r '.sha // empty')
          echo "sha=${SHA:-unknown}" >> $GITHUB_OUTPUT
          if [ -n "$SHA" ]; then
            STATUS=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/zamkara/ark-aur/commits/$SHA/status 2>/dev/null | \
              jq -r '.state // empty')
            echo "ci=${STATUS:-unknown}" >> $GITHUB_OUTPUT
          else
            echo "ci=unknown" >> $GITHUB_OUTPUT
          fi
          echo "ark-aur: sha=$SHA ci=$STATUS"

      - name: Check alga latest commit
        id: alga
        run: |
          SHA=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/zamkara/alga/commits/main 2>/dev/null | \
            jq -r '.sha // empty')
          echo "sha=${SHA:-unknown}" >> $GITHUB_OUTPUT
          if [ -n "$SHA" ]; then
            STATUS=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/zamkara/alga/commits/$SHA/status 2>/dev/null | \
              jq -r '.state // empty')
            echo "ci=${STATUS:-unknown}" >> $GITHUB_OUTPUT
          else
            echo "ci=unknown" >> $GITHUB_OUTPUT
          fi
          echo "alga: sha=$SHA ci=$STATUS"

      - name: Restore cached digest
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: digest-cache.txt
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-
          fail-on-cache-miss: false

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "needs-build=true" >> $GITHUB_OUTPUT
            echo "reason=push" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "needs-build=true" >> $GITHUB_OUTPUT
            echo "reason=force" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT="${{ steps.digest.outputs.value }}"
          AUR_CURRENT="${{ steps.aur.outputs.sha }}"
          AUR_CI="${{ steps.aur.outputs.ci }}"
          ALGA_CURRENT="${{ steps.alga.outputs.sha }}"
          ALGA_CI="${{ steps.alga.outputs.ci }}"

          CACHED=""
          AUR_CACHED=""
          ALGA_CACHED=""
          CACHED_TS=""
          if [ -f digest-cache.txt ]; then
            CACHED=$(sed -n '1p' digest-cache.txt)
            AUR_CACHED=$(sed -n '2p' digest-cache.txt)
            ALGA_CACHED=$(sed -n '3p' digest-cache.txt)
            CACHED_TS=$(sed -n '4p' digest-cache.txt)
          fi

          NOW=$(date +%s)
          needs_build="false"
          reason="skip-no-change"

          if [ -z "$CACHED" ]; then
            needs_build="true"
            reason="initial-build"
          elif [ "$CURRENT" != "$CACHED" ]; then
            needs_build="true"
            reason="update-archlinux"
          elif [ "$AUR_CURRENT" != "$AUR_CACHED" ] && [ "$AUR_CI" = "success" ]; then
            needs_build="true"
            reason="update-aur"
          elif [ "$ALGA_CURRENT" != "$ALGA_CACHED" ] && [ "$ALGA_CI" = "success" ]; then
            needs_build="true"
            reason="update-alga"
          elif [ -n "$CACHED_TS" ] && [ $((NOW - CACHED_TS)) -gt $((7 * 86400)) ]; then
            needs_build="true"
            reason="weekly-fallback"
          fi

          echo "archlinux: cached=$CACHED current=$CURRENT"
          echo "ark-aur: cached=$AUR_CACHED current=$AUR_CURRENT ci=$AUR_CI"
          echo "alga: cached=$ALGA_CACHED current=$ALGA_CURRENT ci=$ALGA_CI"

          echo "needs-build=$needs_build" >> $GITHUB_OUTPUT
          echo "reason=$reason" >> $GITHUB_OUTPUT

  build-iso:
    needs: [check-digest]
    if: needs.check-digest.outputs.needs-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman wget curl jq
      - name: Download AUR packages
        run: |
          mkdir -p aur-packages
          cd aur-packages
          python3 << 'EOF' | wget -qi -
          import urllib.request, json, os
          token = os.environ.get("GITHUB_TOKEN", "")
          req = urllib.request.Request("https://api.github.com/repos/zamkara/ark-aur/releases/latest", headers={"User-Agent": "Ark"})
          if token:
              req.add_header("Authorization", f"Bearer {token}")
          data = json.loads(urllib.request.urlopen(req).read().decode())
          for a in data.get("assets", []):
              if a["name"].endswith(".pkg.tar.zst"):
                  print(a["browser_download_url"])
          EOF
          echo "Downloaded packages:"
          ls -lh
          cd ..
      - name: Download Alga Package
        run: |
          cd aur-packages
          ALGA_URL=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/zamkara/alga/releases/latest" | grep -oP '"browser_download_url":\s*"\K[^"]+' | grep -v 'debug')
          if [ -n "$ALGA_URL" ]; then
            echo "Downloading Alga Package: $ALGA_URL"
            wget -q "$ALGA_URL"
          fi
          cd ..
      - name: Cache Pacman ISO
        uses: actions/cache@v4
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-iso-${{ hashFiles('.github/workflows/archiso/packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-iso-
      - name: Prepare Cache Dirs
        run: mkdir -p pacman-cache
      - name: Build Live Installer ISO
        run: |
          chmod +x .github/workflows/build_iso.sh
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-cache:/var/cache/pacman/pkg -w /work docker.io/archlinux:latest bash /work/.github/workflows/build_iso.sh
          sudo chown -R $USER:$USER out/ pacman-cache/
          mv out/*.iso out/ark-installer.iso
      - name: Upload ISO Workspace Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-iso-internal
          path: out/ark-installer.iso

  upload-github:
    needs: build-iso
    runs-on: ubuntu-latest
    steps:
      - name: Download ISO Workspace Artifact
        uses: actions/download-artifact@v4
        with:
          name: ark-iso-internal
          path: out/
      - name: Upload ISO to Github Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ark-iso
          path: out/ark-installer.iso

  upload-mirror:
    needs: build-iso
    runs-on: ubuntu-latest
    outputs:
      DOWNLOAD_URL: ${{ steps.ranoz-upload.outputs.DOWNLOAD_URL }}
      EXPIRATION_DATE: ${{ steps.ranoz-upload.outputs.EXPIRATION_DATE }}
    steps:
      - name: Download ISO Workspace Artifact
        uses: actions/download-artifact@v4
        with:
          name: ark-iso-internal
          path: out/
      - name: Upload to Ranoz
        id: ranoz-upload
        run: |
          FILE_PATH="out/ark-installer.iso"
          FILENAME="ark-installer-${{ github.sha }}.iso"
          SIZE=$(stat -c%s "$FILE_PATH")

          RESPONSE=$(curl -s -X POST https://ranoz.gg/api/v1/files/upload_url -H "Content-Type: application/json" -d "{
            \"filename\": \"$FILENAME\",
            \"size\": $SIZE
          }")
          
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.upload_url')
          FILE_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          FILE_URL=$(echo "$RESPONSE" | jq -r '.data.url // empty')
          
          if [ -z "$FILE_URL" ]; then
            FILE_URL="https://ranoz.gg/api/v1/files/$FILE_ID"
          fi
          
          echo "Uploading $FILENAME ($SIZE bytes)..."
          curl -T "$FILE_PATH" "$UPLOAD_URL"
          
          EXP_DATE=$(date -d "+1 month" "+%d %B %Y")
          echo "DOWNLOAD_URL=$FILE_URL" >> $GITHUB_OUTPUT
          echo "EXPIRATION_DATE=$EXP_DATE" >> $GITHUB_OUTPUT

  release:
    needs: [upload-github, upload-mirror]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download ISO Workspace Artifact
        uses: actions/download-artifact@v4
        with:
          name: ark-iso-internal
          path: out/
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "ark linux Build (${{ github.sha }})"
          body: |
            ## ark OS Release 🚀
            
            This is an automated nightly build of ark OS from commit ${{ github.sha }}.
            
            ### 📜 Changelog
            View the latest source changes here: [Commit History](https://github.com/${{ github.repository }}/commits/main)
            
            ### 💾 Downloads
            You can download the ISO from the GitHub Assets below, or use our high-speed alternative mirror:
            
            [Download](${{ needs.upload-mirror.outputs.DOWNLOAD_URL }}) (Expires on ${{ needs.upload-mirror.outputs.EXPIRATION_DATE }})
          files: out/ark-installer.iso
          prerelease: false
          make_latest: true

  update-cache:
    needs: [check-digest, build-iso]
    if: |
      !cancelled() &&
      needs.check-digest.outputs.needs-build == 'true' &&
      needs.build-iso.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Prepare cache content
        run: |
          {
            echo "${{ needs.check-digest.outputs.digest }}"
            echo "${{ needs.check-digest.outputs.aur-sha }}"
            echo "${{ needs.check-digest.outputs.alga-sha }}"
            date +%s
          } > digest-cache.txt
          cat digest-cache.txt

      - name: Save digest cache
        uses: actions/cache/save@v4
        with:
          path: digest-cache.txt
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}

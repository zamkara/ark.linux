name: Build ark Installer ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:


jobs:
  build-alga:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            .github/workflows/alga/target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-alga-${{ hashFiles('.github/workflows/alga/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-alga-
      - name: Install Rust and GTK4 dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - name: Build Alga Binary
        working-directory: .github/workflows/alga
        run: cargo build --release
      - name: Upload Alga Binary
        uses: actions/upload-artifact@v7
        with:
          name: alga-binary
          path: .github/workflows/alga/target/release/alga

  build-aur-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [bootupd, bootc]
    steps:
      - uses: actions/checkout@v6
      - name: Get AUR Version
        id: aur-version
        run: |
          VERSION=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg[]=${{ matrix.package }}" | jq -r '.results[] | "\(.Name)-\(.Version)"')
          echo "key=$VERSION" >> $GITHUB_OUTPUT
      - name: Cache AUR package
        id: cache-aur
        uses: actions/cache@v5
        with:
          path: aur-out/
          key: ${{ runner.os }}-aur-${{ steps.aur-version.outputs.key }}
      - name: Cache Pacman AUR Build
        if: steps.cache-aur.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: pacman-aur-cache/
          key: ${{ runner.os }}-pacman-aur-v1
          restore-keys: |
            ${{ runner.os }}-pacman-aur-
      - name: Cache Cargo AUR
        uses: actions/cache@v5
        with:
          path: cargo-aur-cache-${{ matrix.package }}/
          key: ${{ runner.os }}-cargo-aur-${{ matrix.package }}-${{ steps.aur-version.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-cargo-aur-${{ matrix.package }}-
      - name: Prepare Cache Dir
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p pacman-aur-cache cargo-aur-cache-${{ matrix.package }}
      - name: Build AUR package in Arch container
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p aur-out
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-aur-cache:/var/cache/pacman/pkg -v $(pwd)/cargo-aur-cache-${{ matrix.package }}:/home/builduser/.cargo -w /work docker.io/archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel git sudo rust
            useradd -m builduser
            chown -R builduser:builduser /home/builduser/.cargo
            passwd -d builduser
            echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builduser
            
            sudo -u builduser bash -c '
              cd ~
              git clone https://aur.archlinux.org/${{ matrix.package }}.git
              cd ${{ matrix.package }} && makepkg -s --noconfirm
            '
            cp /home/builduser/${{ matrix.package }}/*.pkg.tar.zst /work/aur-out/
          "
          sudo chown -R $USER:$USER aur-out/ pacman-aur-cache/ cargo-aur-cache-${{ matrix.package }}/
      - name: Upload AUR package
        uses: actions/upload-artifact@v7
        with:
          name: aur-package-${{ matrix.package }}
          path: aur-out/*.pkg.tar.zst

  build-payload:
    needs: [build-aur-packages, build-alga]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ark, ark-nvidia, ark-zen, ark-zen-nvidia, ark-lts, ark-lts-nvidia, ark-hardened, ark-hardened-nvidia]
    steps:
      - uses: actions/checkout@v6
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Download AUR packages
        uses: actions/download-artifact@v8
        with:
          pattern: aur-package-*
          path: aur-packages/
          merge-multiple: true
      - name: Download Alga Binary
        uses: actions/download-artifact@v8
        with:
          name: alga-binary
          path: alga-binary/
      - name: Cache Pacman Payload
        uses: actions/cache@v5
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-${{ hashFiles('Containerfile') }}
          restore-keys: |
            ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-
            ${{ runner.os }}-pacman-payload-
      - name: Prepare Cache Dir
        run: mkdir -p pacman-cache
      - name: Build custom ark image with bootupd
        run: |
          sudo podman build -v $(pwd)/pacman-cache:/var/cache/pacman/pkg --squash-all --build-arg VARIANT=${{ matrix.variant }} -t ghcr.io/${{ github.repository }}:${{ matrix.variant }} -f Containerfile .
          sudo chown -R $USER:$USER pacman-cache/
      - name: Log in to the Container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push payload image to GHCR
        run: sudo podman push ghcr.io/${{ github.repository }}:${{ matrix.variant }}

  build-iso:
    needs: [build-aur-packages, build-alga]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      DOWNLOAD_URL: ${{ steps.ranoz-upload.outputs.DOWNLOAD_URL }}
      EXPIRATION_DATE: ${{ steps.ranoz-upload.outputs.EXPIRATION_DATE }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Download AUR packages
        uses: actions/download-artifact@v8
        with:
          pattern: aur-package-*
          path: aur-packages/
          merge-multiple: true
      - name: Download Alga Binary
        uses: actions/download-artifact@v8
        with:
          name: alga-binary
          path: alga-binary/
      - name: Cache Pacman ISO
        uses: actions/cache@v5
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-iso-${{ hashFiles('.github/workflows/archiso/packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-iso-
      - name: Prepare Cache Dirs
        run: mkdir -p pacman-cache
      - name: Build Live Installer ISO
        run: |
          chmod +x .github/workflows/build_iso.sh
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-cache:/var/cache/pacman/pkg -w /work docker.io/archlinux:latest bash /work/.github/workflows/build_iso.sh
          sudo chown -R $USER:$USER out/ pacman-cache/
          mv out/*.iso out/ark-installer.iso
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ark-iso
          path: out/
      - name: Upload to Ranoz
        id: ranoz-upload
        run: |
          FILE_PATH="out/ark-installer.iso"
          FILENAME="ark-installer-${{ github.sha }}.iso"
          SIZE=$(stat -c%s "$FILE_PATH")

          RESPONSE=$(curl -s -X POST https://ranoz.gg/api/v1/files/upload_url -H "Content-Type: application/json" -d "{
            \"filename\": \"$FILENAME\",
            \"size\": $SIZE
          }")
          
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.upload_url')
          FILE_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          FILE_URL=$(echo "$RESPONSE" | jq -r '.data.url // empty')
          
          if [ -z "$FILE_URL" ]; then
            FILE_URL="https://ranoz.gg/api/v1/files/$FILE_ID"
          fi
          
          echo "Uploading $FILENAME ($SIZE bytes)..."
          curl -T "$FILE_PATH" "$UPLOAD_URL"
          
          EXP_DATE=$(date -d "+1 month" "+%d %B %Y")
          echo "DOWNLOAD_URL=$FILE_URL" >> $GITHUB_OUTPUT
          echo "EXPIRATION_DATE=$EXP_DATE" >> $GITHUB_OUTPUT

  release:
    needs: [build-payload, build-iso]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v8
        with:
          name: ark-iso
          path: out/
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.sha }}
          name: "ark linux Build (${{ github.sha }})"
          body: |
            ## ark OS Release 🚀
            
            This is an automated nightly build of ark OS from commit ${{ github.sha }}.
            
            ### 📜 Changelog
            View the latest source changes here: [Commit History](https://github.com/${{ github.repository }}/commits/main)
            
            ### 💾 Downloads
            You can download the ISO from the GitHub Assets below, or use our high-speed alternative mirror:
            
            [Download](${{ needs.build-iso.outputs.DOWNLOAD_URL }}) (Expires on ${{ needs.build-iso.outputs.EXPIRATION_DATE }})
          files: out/ark-installer.iso
          prerelease: false
          make_latest: true

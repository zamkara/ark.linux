name: Build Apollo Installer ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-payload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [apollo, apollo-nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Build custom Apollo image with bootupd
        run: sudo podman build --squash-all --build-arg BASE_IMAGE=ghcr.io/apollo-linux/${{ matrix.variant }}:latest -t ghcr.io/${{ github.repository }}:${{ matrix.variant }} -f Containerfile .
      - name: Transfer Squashed Image to Docker
        run: |
          sudo podman save ghcr.io/${{ github.repository }}:${{ matrix.variant }} -o payload.tar
          docker load -i payload.tar
          rm payload.tar
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push payload image to GHCR
        run: docker push ghcr.io/${{ github.repository }}:${{ matrix.variant }}

  build-iso:
    needs: build-payload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Build Live Installer ISO
        run: |
          sudo podman run --rm --privileged -v $(pwd):/work -w /work docker.io/archlinux:latest bash -c "pacman -Syu --noconfirm archiso && mkarchiso -v -w workdir/ -o out/ archiso/"
          sudo chown -R $USER:$USER out/
          mv out/*.iso out/apollo-installer.iso
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apollo-iso
          path: out/apollo-installer.iso
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.sha }}
          name: "Apollo Linux Build (${{ github.sha }})"
          files: out/apollo-installer.iso
          prerelease: true
          make_latest: true

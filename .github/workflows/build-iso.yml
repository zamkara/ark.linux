name: Build ark Installer ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-alga:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            .github/workflows/alga/target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-alga-${{ hashFiles('.github/workflows/alga/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-alga-
      - name: Install Rust and GTK4 dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - name: Build Alga Binary
        working-directory: .github/workflows/alga
        run: cargo build --release
      - name: Upload Alga Binary
        uses: actions/upload-artifact@v4
        with:
          name: alga-binary
          path: .github/workflows/alga/target/release/alga

  build-aur-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get AUR Versions
        id: aur-versions
        run: |
          VERSIONS=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg[]=bootc&arg[]=bootupd" | jq -r '.results[] | "\(.Name)-\(.Version)"' | sort | paste -sd "-" -)
          echo "key=$VERSIONS" >> $GITHUB_OUTPUT
      - name: Cache AUR packages
        id: cache-aur
        uses: actions/cache@v4
        with:
          path: aur-out/
          key: ${{ runner.os }}-aur-${{ steps.aur-versions.outputs.key }}
      - name: Cache Pacman AUR Build
        if: steps.cache-aur.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: pacman-aur-cache/
          key: ${{ runner.os }}-pacman-aur-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pacman-aur-
      - name: Prepare Cache Dir
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: mkdir -p pacman-aur-cache
      - name: Build AUR packages in Arch container
        if: steps.cache-aur.outputs.cache-hit != 'true'
        run: |
          mkdir -p aur-out
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-aur-cache:/var/cache/pacman/pkg -w /work docker.io/archlinux:latest bash -c '
            pacman -Syu --noconfirm base-devel git sudo
            useradd -m builduser
            passwd -d builduser
            echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
            
            sudo -u builduser bash -c "
              cd ~
              git clone https://aur.archlinux.org/bootupd.git
              cd bootupd && makepkg -s --noconfirm
            "
            cp /home/builduser/bootupd/*.pkg.tar.zst /work/aur-out/
            
            sudo -u builduser bash -c "
              cd ~
              git clone https://aur.archlinux.org/bootc.git
              cd bootc && makepkg -s --noconfirm
            "
            cp /home/builduser/bootc/*.pkg.tar.zst /work/aur-out/
          '
      - name: Upload AUR packages
        uses: actions/upload-artifact@v4
        with:
          name: aur-packages
          path: aur-out/*.pkg.tar.zst

  build-payload:
    needs: [build-aur-packages, build-alga]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ark, ark-nvidia]
    steps:
      - uses: actions/checkout@v4

      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Download AUR packages
        uses: actions/download-artifact@v4
        with:
          name: aur-packages
          path: aur-packages/
      - name: Download Alga Binary
        uses: actions/download-artifact@v4
        with:
          name: alga-binary
          path: alga-binary/
      - name: Cache Pacman Payload
        uses: actions/cache@v4
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-payload-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pacman-payload-
      - name: Prepare Cache Dir
        run: mkdir -p pacman-cache
      - name: Build custom ark image with bootupd
        run: sudo podman build -v $(pwd)/pacman-cache:/var/cache/pacman/pkg --squash-all --build-arg VARIANT=${{ matrix.variant }} -t ghcr.io/${{ github.repository }}:${{ matrix.variant }} -f Containerfile .
      - name: Log in to the Container registry
        run: podman login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - name: Push payload image to GHCR
        run: podman push ghcr.io/${{ github.repository }}:${{ matrix.variant }}

  build-iso:
    needs: build-payload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Download AUR packages
        uses: actions/download-artifact@v4
        with:
          name: aur-packages
          path: aur-packages/
      - name: Download Alga Binary
        uses: actions/download-artifact@v4
        with:
          name: alga-binary
          path: alga-binary/
      - name: Cache Pacman ISO
        uses: actions/cache@v4
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-iso-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pacman-iso-
      - name: Prepare Cache Dirs
        run: mkdir -p pacman-cache
      - name: Build Live Installer ISO
        run: |
          chmod +x .github/workflows/build_iso.sh
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-cache:/var/cache/pacman/pkg -w /work docker.io/archlinux:latest bash /work/.github/workflows/build_iso.sh
          sudo chown -R $USER:$USER out/
          mv out/*.iso out/ark-installer.iso
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-iso
          path: out/ark-installer.iso
      - name: Upload to Ranoz
        id: ranoz-upload
        run: |
          FILE_PATH="out/ark-installer.iso"
          FILENAME="ark-installer-${{ github.sha }}.iso"
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.upload_url')
          FILE_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          FILE_URL=$(echo "$RESPONSE" | jq -r '.data.url // empty')
          
          if [ -z "$FILE_URL" ]; then
            FILE_URL="https://ranoz.gg/api/v1/files/$FILE_ID"
          fi
          
          echo "Uploading $FILENAME ($SIZE bytes)..."
          curl -T "$FILE_PATH" "$UPLOAD_URL"
          
          EXP_DATE=$(date -d "+1 month" "+%d %B %Y")
          echo "DOWNLOAD_URL=$FILE_URL" >> $GITHUB_OUTPUT
          echo "EXPIRATION_DATE=$EXP_DATE" >> $GITHUB_OUTPUT
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.sha }}
          name: "ark linux Build (${{ github.sha }})"
          body: |
            ## ark OS Release 🚀
            
            This is an automated nightly build of ark OS from commit ${{ github.sha }}.
            
            ### 📜 Changelog
            View the latest source changes here: [Commit History](https://github.com/${{ github.repository }}/commits/main)
            
            ### 💾 Downloads
            You can download the ISO from the GitHub Assets below, or use our high-speed alternative mirror:
            
            [Download](${{ steps.ranoz-upload.outputs.DOWNLOAD_URL }}) (Expires on ${{ steps.ranoz-upload.outputs.EXPIRATION_DATE }})
          files: out/ark-installer.iso
          prerelease: false
          make_latest: true

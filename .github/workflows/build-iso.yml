name: Build Apollo NVIDIA ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman xorriso
      
      - name: Build custom Apollo image with bootupd
        run: |
          sudo podman build -t apollo-nvidia-bootupd:latest -f Containerfile .
      
      - name: Create bootable image
        run: |
          mkdir -p output
          sudo dd if=/dev/zero of=output/apollo-nvidia.img bs=1G count=10
          
          sudo podman run --rm --privileged \
            --pid=host \
            --volume /dev:/dev \
            --volume $(pwd)/output:/output \
            apollo-nvidia-bootupd:latest \
            bootc install to-disk --via-loopback \
            --filesystem btrfs \
            /output/apollo-nvidia.img
      
      - name: Compress Image
        run: |
          cd output
          sudo apt-get install -y zstd
          sudo zstd -T0 -10 apollo-nvidia.img -o apollo-nvidia.img.zst
          ls -lh apollo-nvidia.img.zst
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apollo-nvidia-img
          path: output/apollo-nvidia.img.zst

name: Build Apollo NVIDIA ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true
      
      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman xorriso
      
      - name: Build custom Apollo image with bootupd
        run: |
          sudo podman build -t apollo-nvidia-bootupd:latest -f Containerfile .
      
      - name: Build Installer ISO
        run: |
          mkdir -p output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v $(pwd)/output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --local \
            localhost/apollo-nvidia-bootupd:latest
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apollo-nvidia-iso
          path: output/bootiso/install.iso

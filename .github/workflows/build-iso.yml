name: Build ark Installer ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build-payload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ark, ark-nvidia, ark-zen, ark-zen-nvidia, ark-lts, ark-lts-nvidia, ark-hardened, ark-hardened-nvidia]
    steps:
      - uses: actions/checkout@v6
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman wget
      - name: Download AUR packages
        run: |
          mkdir -p aur-packages
          cd aur-packages
          wget -q https://github.com/zamkara/ark-aur/releases/download/latest/bootupd-0.2.19-1-x86_64.pkg.tar.zst || true
          wget -q https://github.com/zamkara/ark-aur/releases/download/latest/bootc-0.1.18-1-x86_64.pkg.tar.zst || true
          # Note: We fallback to true just in case the release is still building, but ideally these should be present.
          # Alternatively, use GitHub API to fetch all assets from the latest release.
          curl -s https://api.github.com/repos/zamkara/ark-aur/releases/tags/latest | jq -r '.assets[].browser_download_url' | wget -i - || true
          cd ..
      - name: Download Alga Binary
        run: |
          mkdir -p alga-binary
          cd alga-binary
          wget -q https://github.com/zamkara/alga/releases/download/latest/alga
          chmod +x alga
          cd ..
      - name: Cache Pacman Payload
        uses: actions/cache@v4
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-${{ hashFiles('Containerfile') }}
          restore-keys: |
            ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-
            ${{ runner.os }}-pacman-payload-
      - name: Prepare Cache Dir
        run: mkdir -p pacman-cache
      - name: Build custom ark image with bootupd
        run: |
          sudo podman build -v $(pwd)/pacman-cache:/var/cache/pacman/pkg --squash-all --build-arg VARIANT=${{ matrix.variant }} -t ghcr.io/${{ github.repository }}:${{ matrix.variant }} -f Containerfile .
          sudo chown -R $USER:$USER pacman-cache/
      - name: Log in to the Container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push payload image to GHCR
        run: sudo podman push ghcr.io/${{ github.repository }}:${{ matrix.variant }}

  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      DOWNLOAD_URL: ${{ steps.ranoz-upload.outputs.DOWNLOAD_URL }}
      EXPIRATION_DATE: ${{ steps.ranoz-upload.outputs.EXPIRATION_DATE }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman wget curl jq
      - name: Download AUR packages
        run: |
          mkdir -p aur-packages
          cd aur-packages
          curl -s https://api.github.com/repos/zamkara/ark-aur/releases/tags/latest | jq -r '.assets[].browser_download_url' | wget -i - || true
          cd ..
      - name: Download Alga Binary
        run: |
          mkdir -p alga-binary
          cd alga-binary
          wget -q https://github.com/zamkara/alga/releases/download/latest/alga
          chmod +x alga
          cd ..
      - name: Cache Pacman ISO
        uses: actions/cache@v4
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-iso-${{ hashFiles('.github/workflows/archiso/packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-iso-
      - name: Prepare Cache Dirs
        run: mkdir -p pacman-cache
      - name: Build Live Installer ISO
        run: |
          chmod +x .github/workflows/build_iso.sh
          sudo podman run --rm --privileged -v $(pwd):/work -v $(pwd)/pacman-cache:/var/cache/pacman/pkg -w /work docker.io/archlinux:latest bash /work/.github/workflows/build_iso.sh
          sudo chown -R $USER:$USER out/ pacman-cache/
          mv out/*.iso out/ark-installer.iso
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-iso
          path: out/
      - name: Upload to Ranoz
        id: ranoz-upload
        run: |
          FILE_PATH="out/ark-installer.iso"
          FILENAME="ark-installer-${{ github.sha }}.iso"
          SIZE=$(stat -c%s "$FILE_PATH")

          RESPONSE=$(curl -s -X POST https://ranoz.gg/api/v1/files/upload_url -H "Content-Type: application/json" -d "{
            \"filename\": \"$FILENAME\",
            \"size\": $SIZE
          }")
          
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.upload_url')
          FILE_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          FILE_URL=$(echo "$RESPONSE" | jq -r '.data.url // empty')
          
          if [ -z "$FILE_URL" ]; then
            FILE_URL="https://ranoz.gg/api/v1/files/$FILE_ID"
          fi
          
          echo "Uploading $FILENAME ($SIZE bytes)..."
          curl -T "$FILE_PATH" "$UPLOAD_URL"
          
          EXP_DATE=$(date -d "+1 month" "+%d %B %Y")
          echo "DOWNLOAD_URL=$FILE_URL" >> $GITHUB_OUTPUT
          echo "EXPIRATION_DATE=$EXP_DATE" >> $GITHUB_OUTPUT

  release:
    needs: [build-payload, build-iso]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ark-iso
          path: out/
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "ark linux Build (${{ github.sha }})"
          body: |
            ## ark OS Release 🚀
            
            This is an automated nightly build of ark OS from commit ${{ github.sha }}.
            
            ### 📜 Changelog
            View the latest source changes here: [Commit History](https://github.com/${{ github.repository }}/commits/main)
            
            ### 💾 Downloads
            You can download the ISO from the GitHub Assets below, or use our high-speed alternative mirror:
            
            [Download](${{ needs.build-iso.outputs.DOWNLOAD_URL }}) (Expires on ${{ needs.build-iso.outputs.EXPIRATION_DATE }})
          files: out/ark-installer.iso
          prerelease: false
          make_latest: true

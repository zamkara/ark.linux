name: Build Apollo Installer ISO

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [apollo, apollo-nvidia]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      
      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      
      - name: Build custom Apollo image with bootupd
        run: |
          sudo podman build --build-arg BASE_IMAGE=ghcr.io/apollo-linux/${{ matrix.variant }}:latest -t apollo-bootupd:latest -f Containerfile .
      
      - name: Save container image for offline installation
        run: |
          mkdir -p archiso/airootfs/root/
          sudo podman save apollo-bootupd:latest -o archiso/airootfs/root/apollo-image.tar
      
      - name: Build Live Installer ISO
        run: |
          sudo podman run --rm --privileged -v $(pwd):/work -w /work docker.io/archlinux:latest bash -c "pacman -Syu --noconfirm archiso && mkarchiso -v -w workdir/ -o out/ archiso/"
          sudo chown -R $USER:$USER out/
          mv out/*.iso out/${{ matrix.variant }}-installer.iso
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-iso
          path: out/${{ matrix.variant }}-installer.iso
          
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: nightly
          name: "Apollo Linux Nightly Build"
          files: out/${{ matrix.variant }}-installer.iso
          prerelease: true
          make_latest: true
